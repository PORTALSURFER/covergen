name: Performance Gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  visual-regression:
    name: V2 Visual Regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Run V2 still snapshot regression
        run: cargo test v2_still_fixed_seed_snapshots_match

      - name: Run V2 animation snapshot regression
        run: cargo test v2_animation_fixed_seed_sampled_frames_match

  benchmark-thresholds:
    name: Benchmark Threshold Gate (CI Software)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Run benchmark threshold validation
        run: >
          cargo run --quiet -- bench
          --tier ci_software
          --samples 3
          --animation-samples 1
          --size 128
          --seconds 1
          --fps 4
          --output-dir target/bench_ci_software
          --thresholds .github/bench/ci_software.thresholds.ini

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-ci-software
          path: |
            target/bench_ci_software/benchmark_report.md
            target/bench_ci_software/benchmark_metrics.ini

  benchmark-thresholds-hardware:
    name: Benchmark Threshold Gate (${{ matrix.tier }})
    if: ${{ vars.COVERGEN_ENABLE_HARDWARE_TIER_GATES == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - tier: desktop_mid
            runner_label: covergen-desktop-mid
          - tier: laptop_integrated
            runner_label: covergen-laptop-integrated
    runs-on:
      - self-hosted
      - linux
      - x64
      - ${{ matrix.runner_label }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Ensure threshold file is locked
        run: |
          test -f docs/v2/benchmarks/${{ matrix.tier }}.thresholds.ini
          ! grep -q 'LOCK REQUIRED' docs/v2/benchmarks/${{ matrix.tier }}.thresholds.ini

      - name: Validate rust-gpu shader artifacts
        run: scripts/shaders/validate_rust_gpu_artifacts.sh

      - name: Run hardware tier threshold validation
        run: >
          cargo run --quiet -- bench
          --tier ${{ matrix.tier }}
          --samples 8
          --animation-samples 4
          --size 1024
          --seconds 6
          --fps 24
          --output-dir target/bench_${{ matrix.tier }}
          --thresholds docs/v2/benchmarks/${{ matrix.tier }}.thresholds.ini
          --require-v2-scenarios

      - name: Upload hardware benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.tier }}
          path: |
            target/bench_${{ matrix.tier }}/benchmark_report.md
            target/bench_${{ matrix.tier }}/benchmark_metrics.ini

  visual-regression-gpu:
    name: V2 GPU Visual Regression (${{ matrix.tier }})
    if: ${{ vars.COVERGEN_ENABLE_HARDWARE_TIER_GATES == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - tier: desktop_mid
            runner_label: covergen-desktop-mid
          - tier: laptop_integrated
            runner_label: covergen-laptop-integrated
    runs-on:
      - self-hosted
      - linux
      - x64
      - ${{ matrix.runner_label }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Validate rust-gpu shader artifacts
        run: scripts/shaders/validate_rust_gpu_artifacts.sh

      - name: Run GPU still deterministic regression
        run: cargo test v2_gpu_still_fixed_seed_is_deterministic_when_hardware_available

      - name: Run GPU animation temporal regression
        run: cargo test v2_gpu_animation_sampled_frames_change_when_hardware_available
