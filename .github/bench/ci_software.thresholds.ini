# covergen cutover thresholds
# ci_software guardrails are intentionally conservative because shared CPU runners
# have high jitter and V2 GPU benchmarks are skipped on software adapters.
version=1
tier=ci_software

[v1_still]
latency_p50_ms_max=1200.000000
latency_p95_ms_max=3500.000000
frame_time_p50_ms_max=0.000000
frame_time_p95_ms_max=0.000000
throughput_p50_fps_min=0.500000
throughput_p95_fps_min=0.350000
