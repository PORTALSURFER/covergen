# Structure drift soft-gate thresholds.
# Used by scripts/lint/structure_drift_report.{sh,ps1}.

# File is considered oversized when LOC > max_file_lines.
max_file_lines=400

# Soft baseline limits (warn/fail based on COVERGEN_STRUCTURE_DRIFT_GATE).
# Ratcheted on 2026-03-05 close to current baseline with minimal safety headroom.
max_oversized_files=34
max_dead_code_suppressions=8
max_too_many_arguments_suppressions=3
